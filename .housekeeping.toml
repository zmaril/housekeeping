fleet = "zmaril/powderworks"
logo = "assets/duster.svg"  # feather duster, for the fleet dashboard

# housekeeping, on itself: no website — the repo is the product.
[checks]
website = "off"
conventional-commits = "required"  # adopted 2026-07-04; default is recommended

# Test fixtures deliberately embed marker-like strings (a commented placeholder,
# a bad commit prefix) to exercise other checks — not real todos to corral. The
# stray-todos module also documents the marker tags it matches, so it trips
# itself — ignore its own definition file too.
[stray-todos]
ignore = ["tests/", "src/housekeeper/checks/stray_todos.py"]

[allow-auto-merge]
# Auto-merge is enabled on the repo so a green PR can land without a babysitter.
# The check asserts GitHub's allow_auto_merge matches this declaration.
enabled = true
