name: straitjacket
on:
  push:
    branches: [main]
  pull_request:

jobs:
  straitjacket:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Pinned, not `main`/latest: a new straitjacket rule shouldn't fail this
      # repo's CI until we deliberately bump — the same rule we ask consumers to
      # follow for the housekeeping action.
      - uses: zmaril/straitjacket@v0.2.3
        with:
          version: v0.2.3
          sarif: "false"
